# Local dev stack: orchestrator app, Celery worker, Redis broker, Postgres for state/audit log.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stellarhydra
      POSTGRES_PASSWORD: stellarhydra
      POSTGRES_DB: stellarhydra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stellarhydra"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "scripts/run_orchestrator.py"]

  worker:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      [
        "celery", "-A", "workers.celery_app", "worker",
        "--loglevel=INFO", "--concurrency=4", "-Q", "ingestion,execution",
      ]

  admin-api:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["uvicorn", "api.admin:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  postgres_data:
